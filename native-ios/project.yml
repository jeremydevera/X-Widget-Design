# XcodeGen project spec — generate with: xcodegen generate
name: Islet
options:
  bundleIdPrefix: com.example.islet
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "ANKC3V97S3"
    MARKETING_VERSION: "0.3.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Islet:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Islet
        UILaunchStoryboardName: ""
        UIApplicationSupportsIndirectInputEvents: true
        UISupportsLiveActivities: true
        UISupportsLiveActivitiesFrequentUpdates: true
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSSupportsLiveActivities: true
        # Privacy usage descriptions (required by iOS for runtime prompts)
        NSMotionUsageDescription: "Track steps, altitude and motion for live widgets and skills."
        NSHealthShareUsageDescription: "Read steps, calories, sleep and heart rate to power Health widgets."
        NSLocationWhenInUseUsageDescription: "Used to fetch local weather and detect arrivals."
        NSCameraUsageDescription: "Optional · used by accessory widgets that scan codes."
        NSBluetoothAlwaysUsageDescription: "Detect car or accessory connections to trigger skills."
        NSAppleEventsUsageDescription: "Open Shortcuts to suggest Focus modes."
        # URL schemes we probe with canOpenURL · used to detect whether each
        # third-party app a shortcut depends on (Data Jar, Toolbox Pro, etc.)
        # is already installed on the device.
        LSApplicationQueriesSchemes:
          - shortcuts
          - data-jar
          - toolbox-pro
          - actions
          - scriptable
          - textcase
          - pushcut
          - charty
          - ashell
          - any-text
          - caffeinated
          - chatgpt
          - microsoft-edge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.islet
        CODE_SIGN_ENTITLEMENTS: App/Islet.entitlements
        ENABLE_PREVIEWS: "YES"
    dependencies:
      - target: IsletWidget
    entitlements:
      path: App/Islet.entitlements

  IsletWidget:
    type: app-extension
    platform: iOS
    sources:
      - Widget
      - Shared
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Islet Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.islet.widget
        SKIP_INSTALL: "YES"

schemes:
  Islet:
    build:
      targets:
        Islet: all
        IsletWidget: all
    run:
      config: Debug
    archive:
      config: Release
