# XcodeGen project spec
# Generate the .xcodeproj with:  xcodegen generate

name: Islet
options:
  bundleIdPrefix: com.example.islet
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""           # set your Apple Developer Team ID
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Islet:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    resources: []
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Islet
        UILaunchStoryboardName: ""
        UIApplicationSupportsIndirectInputEvents: true
        UISupportsLiveActivities: true
        UISupportsLiveActivitiesFrequentUpdates: true
        UIRequiredDeviceCapabilities: [armv7]
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSSupportsLiveActivities: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.islet
        CODE_SIGN_ENTITLEMENTS: App/Islet.entitlements
        ENABLE_PREVIEWS: "YES"
    dependencies:
      - target: IsletWidget
    entitlements:
      path: App/Islet.entitlements

  IsletWidget:
    type: app-extension
    platform: iOS
    sources:
      - Widget
      - Shared
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Islet Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.islet.widget
        SKIP_INSTALL: "YES"

schemes:
  Islet:
    build:
      targets:
        Islet: all
        IsletWidget: all
    run:
      config: Debug
    archive:
      config: Release
